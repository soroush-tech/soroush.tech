name: Continuous Deployment to GitHub Pages
on:
  workflow_dispatch:
  workflow_run:
    workflows: ['Continuous Integration']
    types:
      - completed
    branches:
      - main
concurrency:
  group: 'pages'
  cancel-in-progress: false
jobs:
  changes:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: read
    outputs:
      web: ${{ steps.read.outputs.web }}
    steps:
      - name: Download changes from CI
        if: github.event_name == 'workflow_run'
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: changes
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Decide whether to deploy
        id: read
        run: |
          # Manual dispatch or a missing artifact → deploy. Otherwise deploy when the
          # web app, any package (web bundles them), or a root config changed.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ ! -f changes.json ]; then
            echo "web=true" >> "$GITHUB_OUTPUT"
          else
            node <<'NODE' >> "$GITHUB_OUTPUT"
            const c = require('./changes.json')
            const web = (c.apps || []).includes('web') || (c.packages || []).length > 0 || c.root
            console.log(`web=${web}`)
          NODE
          fi

  build:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    environment: github-pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Read Node.js version from .nvmrc
        id: read-node-version
        run: |
          if [ -f "${{ github.workspace }}/.nvmrc" ]; then
            NODE_VERSION=$(cat ${{ github.workspace }}/.nvmrc)
            echo "NODE_VERSION=$NODE_VERSION" >> $GITHUB_ENV
          else
            echo ".nvmrc file not found"
            exit 1
          fi

      - name: Detect package manager
        id: detect-package-manager
        run: |
          if [ -f "${{ github.workspace }}/pnpm-lock.yaml" ]; then
            echo "manager=pnpm" >> $GITHUB_OUTPUT
            echo "command=install --frozen-lockfile" >> $GITHUB_OUTPUT
            echo "runner=pnpm" >> $GITHUB_OUTPUT
            exit 0
          elif [ -f "${{ github.workspace }}/package.json" ]; then
            echo "manager=npm" >> $GITHUB_OUTPUT
            echo "command=ci" >> $GITHUB_OUTPUT
            echo "runner=npx --no-install" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "Unable to determine package manager"
            exit 1
          fi

      - name: Setup pnpm
        if: steps.detect-package-manager.outputs.manager == 'pnpm'
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: ${{steps.detect-package-manager.outputs.manager}}

      - name: Install dependencies
        run: ${{ steps.detect-package-manager.outputs.manager }} ${{ steps.detect-package-manager.outputs.command }}

      - name: Build project
        run: ${{ steps.detect-package-manager.outputs.runner }} run build
        env:
          VITE_BASE_URL: ${{ vars.VITE_BASE_URL }}
          VITE_GITHUB_KEY: ${{ secrets.VITE_GITHUB_KEY }}
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_CONTACT_HONEYPOT: ${{ vars.VITE_CONTACT_HONEYPOT }}
          VITE_TURNSTILE_SITEKEY: ${{ secrets.VITE_TURNSTILE_SITEKEY }}
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
          APP_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: ./apps/web/build/client

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

name: Publish Packages (npm)

# Publishes a single non-private package to npm via Trusted Publishing (OIDC):
# manual dispatch only — never from a push, PR merge, or CI completion. A release is a
# deliberate act with required, human-written notes; auth is a short-lived id-token
# minted per run and verified against the npm trusted publisher (no long-lived token).

on:
  workflow_dispatch:
    inputs:
      package:
        description: Package to publish
        required: true
        type: choice
        options:
          - vite-plugin-msw-server
          - playwright-coverage
      notes:
        description: Release notes (markdown) for the GitHub Release — use \n for line breaks
        required: true
        type: string

concurrency:
  group: publish-packages
  cancel-in-progress: false

jobs:
  publish:
    # main-only: a release always comes off the CI-passed main branch, even though the
    # dispatch UI lets you pick any ref.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: cd-packages
    timeout-minutes: 15
    permissions:
      id-token: write # OIDC token for npm Trusted Publishing (no NPM_TOKEN)
      contents: write # create the GitHub Release + tag
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      # The choice list is static YAML and can drift from packages/, and only non-private
      # packages may publish — so validate the pick rather than trust it. $PKG is read
      # from env (never spliced into shell) to avoid injection.
      - name: Validate package
        env:
          PKG: ${{ inputs.package }}
        run: |
          test -f "packages/$PKG/package.json" || { echo "::error::Unknown package: $PKG"; exit 1; }
          node -e 'process.exit(require(`./packages/${process.env.PKG}/package.json`).private === true ? 1 : 0)' \
            || { echo "::error::$PKG is private — not publishable"; exit 1; }

      - name: Read Node.js version from .nvmrc
        run: echo "NODE_VERSION=$(cat .nvmrc)" >> "$GITHUB_ENV"

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Publish via npm Trusted Publishing (OIDC). Auth comes from the id-token minted
      # above — there is no NPM_TOKEN, and NODE_AUTH_TOKEN must stay unset (even an empty
      # value makes pnpm use token auth instead of falling back to OIDC). Skip a version
      # already on the registry rather than fail trying to republish it; bump the package
      # version on main to release.
      - name: Publish ${{ inputs.package }}
        id: publish
        env:
          PKG: ${{ inputs.package }}
        run: |
          cd "packages/$PKG"
          name=$(node -p "require('./package.json').name")
          version=$(node -p "require('./package.json').version")
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if npm view "$name@$version" version >/dev/null 2>&1; then
            echo "⏭️ \`$name@$version\` already on npm — skipped (bump the version to release)." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          pnpm publish --no-git-checks
          echo "### 📦 Published \`$name@$version\`" >> "$GITHUB_STEP_SUMMARY"
          echo "https://www.npmjs.com/package/$name/v/$version" >> "$GITHUB_STEP_SUMMARY"
          echo "::notice title=Published::$name@$version"

      # Create the GitHub Release if it doesn't already exist — gated on the release's
      # existence, not on whether npm was newly published, so a rerun can repair a missing
      # release after a successful publish. Notes are the required `notes` input; context
      # values go through env (never spliced into shell) and --notes-file avoids escaping
      # arbitrary markdown. Parameter expansion turns only the literal `\n` escapes from the
      # single-line dispatch input into real line breaks (workflow_dispatch has no multiline
      # field), leaving other backslash sequences (`\t`, paths, etc.) untouched.
      - name: Create GitHub Release for ${{ inputs.package }}
        env:
          GH_TOKEN: ${{ github.token }}
          NOTES: ${{ inputs.notes }}
          NAME: ${{ steps.publish.outputs.name }}
          VERSION: ${{ steps.publish.outputs.version }}
        run: |
          tag="$NAME@$VERSION"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "⏭️ GitHub Release \`$tag\` already exists — skipped." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          notes=${NOTES//'\n'/$'\n'}
          printf '%s' "$notes" > release-notes.md
          gh release create "$tag" --title "$tag" --notes-file release-notes.md
          echo "### 🏷️ Released \`$tag\`" >> "$GITHUB_STEP_SUMMARY"

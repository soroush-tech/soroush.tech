name: Continuous Integration

on:
  push:
    branches:
      - 'main'
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect node version / package manager once and which areas changed, then
  # expose everything as outputs the other jobs reuse via needs.prepare.outputs.*
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      node_version: ${{ steps.node-version.outputs.version }}
      manager: ${{ steps.detect-package-manager.outputs.manager }}
      command: ${{ steps.detect-package-manager.outputs.command }}
      runner: ${{ steps.detect-package-manager.outputs.runner }}
      playwright_version: ${{ steps.detect-playwright.outputs.version }}
      web: ${{ steps.filter.outputs.web }}
      packages: ${{ steps.filter.outputs.packages }}
      worker: ${{ steps.filter.outputs.worker }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Read Node.js version from .nvmrc
        id: node-version
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - name: Detect package manager
        id: detect-package-manager
        run: |
          if [ -f "${{ github.workspace }}/pnpm-lock.yaml" ]; then
            echo "manager=pnpm" >> $GITHUB_OUTPUT
            echo "command=install --frozen-lockfile" >> $GITHUB_OUTPUT
            echo "runner=pnpm" >> $GITHUB_OUTPUT
            exit 0
          elif [ -f "${{ github.workspace }}/yarn.lock" ]; then
            echo "manager=yarn" >> $GITHUB_OUTPUT
            echo "command=install --frozen-lockfile --non-interactive" >> $GITHUB_OUTPUT
            echo "runner=yarn" >> $GITHUB_OUTPUT
            exit 0
          elif [ -f "${{ github.workspace }}/package.json" ]; then
            echo "manager=npm" >> $GITHUB_OUTPUT
            echo "command=ci" >> $GITHUB_OUTPUT
            echo "runner=npm" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "Unable to determine package manager"
            exit 1
          fi

      - name: Read Playwright version from package.json
        id: detect-playwright
        run: |
          VERSION=$(node -p "require('./apps/web/package.json').devDependencies?.['playwright'] || require('./apps/web/package.json').dependencies?.['playwright']")
          echo "version=${VERSION#^}" >> "$GITHUB_OUTPUT"

      - name: Detect changed areas
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'
              - '.nvmrc'
              - '.github/workflows/ci.yml'
            packages:
              - 'packages/**'
              - 'pnpm-lock.yaml'
              - '.nvmrc'
              - '.github/workflows/ci.yml'
            worker:
              - 'workers/api/**'
              - 'packages/schema/**'
              - 'pnpm-lock.yaml'
              - '.nvmrc'
              - '.github/workflows/ci.yml'

  # Lint + typecheck the whole workspace once (cheap, recursive).
  lint:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup pnpm
        if: needs.prepare.outputs.manager == 'pnpm'
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ needs.prepare.outputs.node_version }}
          cache: ${{ needs.prepare.outputs.manager }}

      - name: Install dependencies
        env:
          CI: true
        run: ${{ needs.prepare.outputs.manager }} ${{ needs.prepare.outputs.command }}

      - name: Run Lint
        run: ${{ needs.prepare.outputs.runner }} run lint

      - name: Run Typecheck
        run: ${{ needs.prepare.outputs.runner }} run typecheck

  # Shared packages: one job per package, each uploads its own Codecov flag.
  packages:
    needs: prepare
    if: needs.prepare.outputs.packages == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - { dir: schema, filter: '@soroush.tech/schema', flag: schema }
          - { dir: eslint-config, filter: '@soroush.tech/eslint-config', flag: eslint-config }
          - {
              dir: vite-plugin-msw-server,
              filter: '@soroush.tech/vite-plugin-msw-server',
              flag: vite-plugin-msw-server,
            }
          - {
              dir: vite-plugin-sitemap,
              filter: '@soroush.tech/vite-plugin-sitemap',
              flag: vite-plugin-sitemap,
            }
          - {
              dir: vite-plugin-watch,
              filter: '@soroush.tech/vite-plugin-watch',
              flag: vite-plugin-watch,
            }
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup pnpm
        if: needs.prepare.outputs.manager == 'pnpm'
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ needs.prepare.outputs.node_version }}
          cache: ${{ needs.prepare.outputs.manager }}

      - name: Install dependencies
        env:
          CI: true
        run: ${{ needs.prepare.outputs.manager }} ${{ needs.prepare.outputs.command }}

      - name: Run Tests with Coverage
        run: ${{ needs.prepare.outputs.runner }} --filter ${{ matrix.filter }} test:coverage

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./packages/${{ matrix.dir }}/coverage/lcov.info
          slug: soroush-tech/soroush.tech
          flags: ${{ matrix.flag }}
          name: ${{ matrix.dir }}

  # Cloudflare Worker API.
  worker:
    needs: prepare
    if: needs.prepare.outputs.worker == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup pnpm
        if: needs.prepare.outputs.manager == 'pnpm'
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ needs.prepare.outputs.node_version }}
          cache: ${{ needs.prepare.outputs.manager }}

      - name: Install dependencies
        env:
          CI: true
        run: ${{ needs.prepare.outputs.manager }} ${{ needs.prepare.outputs.command }}

      - name: Run Tests with Coverage
        run: ${{ needs.prepare.outputs.runner }} --filter @soroush/api test:coverage

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./workers/api/coverage/lcov.info
          slug: soroush-tech/soroush.tech
          flags: api
          name: api

  # Web app: full multi-OS suite with unit / browser / storybook / e2e coverage tiers.
  web:
    needs: prepare
    if: needs.prepare.outputs.web == 'true'
    runs-on: ${{ matrix.os }}
    environment: CI
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macOS-latest]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        if: needs.prepare.outputs.manager == 'pnpm'
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ needs.prepare.outputs.node_version }}
          cache: ${{ needs.prepare.outputs.manager }}

      - name: Restore cache - Playwright binaries
        uses: actions/cache/restore@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ needs.prepare.outputs.playwright_version }}

      - name: Install dependencies
        env:
          CI: true
        run: ${{ needs.prepare.outputs.manager }} ${{ needs.prepare.outputs.command }}

      - name: Install Playwright browsers
        run: pnpm --filter @soroush/web exec playwright install --with-deps

      - name: Save cache - Playwright binaries
        if: always() && steps.playwright-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ needs.prepare.outputs.playwright_version }}

      - name: Build project
        if: matrix.os == 'ubuntu-latest'
        run: ${{ needs.prepare.outputs.runner }} run build
        env:
          SKIP_PRERENDER: 'true'

      - name: Run Test
        run: ${{ needs.prepare.outputs.runner }} --filter @soroush/web test

      - name: Run Unit Tests with Coverage
        if: matrix.os == 'ubuntu-latest'
        run: ${{ needs.prepare.outputs.runner }} run test:coverage:unit

      - name: Upload Unit Test Coverage
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./apps/web/coverage/lcov.info
          slug: soroush-tech/soroush.tech
          flags: unit
          name: Unit

      - name: Run Browser Tests with Coverage
        if: matrix.os == 'ubuntu-latest'
        run: ${{ needs.prepare.outputs.runner }} run test:coverage:browser

      - name: Upload Browser Test Coverage
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./apps/web/coverage/lcov.info
          slug: soroush-tech/soroush.tech
          flags: browser
          name: Browser

      - name: Publish to Chromatic
        id: chromatic
        if: matrix.os == 'ubuntu-latest' && github.actor != 'renovate[bot]'
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          buildScriptName: build:storybook
          storybookBaseDir: apps/web
          exitZeroOnChanges: true
          onlyChanged: true

      - name: Run Storybook Tests with Coverage
        if: matrix.os == 'ubuntu-latest'
        run: ${{ needs.prepare.outputs.runner }} run test:coverage:storybook
        env:
          SB_URL: ${{ steps.chromatic.outputs.storybookUrl }}

      - name: Upload Coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./apps/web/coverage/lcov.info
          slug: soroush-tech/soroush.tech
          flags: storybook
          name: Storybook

      - name: Run E2E Tests with Coverage
        if: matrix.os == 'ubuntu-latest'
        run: ${{ needs.prepare.outputs.runner }} run test:coverage:e2e
        env:
          VITE_BASE_URL: ${{ vars.VITE_BASE_URL }}

      - name: Run E2E Tests (Firefox)
        if: matrix.os == 'windows-latest'
        run: ${{ needs.prepare.outputs.runner }} run test:e2e:firefox
        env:
          VITE_BASE_URL: ${{ vars.VITE_BASE_URL }}

      - name: Run E2E Tests (WebKit)
        if: matrix.os == 'macOS-latest'
        run: ${{ needs.prepare.outputs.runner }} run test:e2e:webkit
        env:
          VITE_BASE_URL: ${{ vars.VITE_BASE_URL }}

      - name: Upload E2E Coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./apps/web/coverage/e2e/lcov.info
          slug: soroush-tech/soroush.tech
          flags: e2e
          name: E2E

name: Continuous Integration

on:
  push:
    branches:
      - 'main'
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect node version / package manager once and which areas changed, then
  # expose everything as outputs the other jobs reuse via needs.prepare.outputs.*
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      node_version: ${{ steps.node-version.outputs.version }}
      manager: ${{ steps.detect-package-manager.outputs.manager }}
      command: ${{ steps.detect-package-manager.outputs.command }}
      runner: ${{ steps.detect-package-manager.outputs.runner }}
      playwright_version: ${{ steps.detect-playwright.outputs.version }}
      web: ${{ steps.filter.outputs.web }}
      worker: ${{ steps.filter.outputs.worker }}
      has_packages: ${{ steps.pkg-matrix.outputs.has_packages }}
      changed_packages: ${{ steps.pkg-matrix.outputs.changed_packages }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Read Node.js version from .nvmrc
        id: node-version
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - name: Detect package manager
        id: detect-package-manager
        run: |
          if [ -f "${{ github.workspace }}/pnpm-lock.yaml" ]; then
            echo "manager=pnpm" >> $GITHUB_OUTPUT
            echo "command=install --frozen-lockfile" >> $GITHUB_OUTPUT
            echo "runner=pnpm" >> $GITHUB_OUTPUT
            exit 0
          elif [ -f "${{ github.workspace }}/yarn.lock" ]; then
            echo "manager=yarn" >> $GITHUB_OUTPUT
            echo "command=install --frozen-lockfile --non-interactive" >> $GITHUB_OUTPUT
            echo "runner=yarn" >> $GITHUB_OUTPUT
            exit 0
          elif [ -f "${{ github.workspace }}/package.json" ]; then
            echo "manager=npm" >> $GITHUB_OUTPUT
            echo "command=ci" >> $GITHUB_OUTPUT
            echo "runner=npm" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "Unable to determine package manager"
            exit 1
          fi

      - name: Read Playwright version from package.json
        id: detect-playwright
        run: |
          VERSION=$(node -p "require('./apps/web/package.json').devDependencies?.['playwright'] || require('./apps/web/package.json').dependencies?.['playwright']")
          echo "version=${VERSION#^}" >> "$GITHUB_OUTPUT"

      # Discover workspace packages once so the change filters and the test matrix
      # share a single source of truth: the folder name and its package.json name.
      - name: Discover packages
        id: pkgs
        run: |
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require('fs')
          const shared = ['pnpm-lock.yaml', '.nvmrc', '.github/workflows/ci.yml']
          const dirs = fs
            .readdirSync('packages', { withFileTypes: true })
            .filter((d) => d.isDirectory() && fs.existsSync(`packages/${d.name}/package.json`))
            .map((d) => d.name)
          const list = dirs.map((dir) => ({ dir, name: require(`./packages/${dir}/package.json`).name, flag: dir }))
          const filters = Object.fromEntries(list.map((p) => [p.flag, [`packages/${p.dir}/**`, ...shared]]))
          filters.web = ['apps/web/**', 'packages/**', ...shared]
          filters.worker = ['workers/api/**', 'packages/schema/**', ...shared]
          console.log(`list=${JSON.stringify(list)}`)
          console.log(`filters=${JSON.stringify(filters)}`)
          NODE

      - name: Detect changed areas
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: ${{ steps.pkgs.outputs.filters }} # JSON is valid YAML

      # Intersect the discovered packages with the filters that matched so only the
      # changed packages run. Shared paths (lockfile / .nvmrc / ci.yml) hit every
      # package filter → full matrix. Empty list → packages job skipped.
      - name: Build changed-packages matrix
        id: pkg-matrix
        env:
          LIST: ${{ steps.pkgs.outputs.list }}
          CHANGES: ${{ steps.filter.outputs.changes }}
        run: |
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const list = JSON.parse(process.env.LIST)
          const changed = new Set(JSON.parse(process.env.CHANGES))
          const include = list
            .filter((p) => changed.has(p.flag))
            .map((p) => ({ dir: p.dir, filter: p.name, flag: p.flag }))
          console.log(`changed_packages=${JSON.stringify({ include })}`)
          console.log(`has_packages=${include.length ? 'true' : 'false'}`)
          NODE

      # Publish the changed-area flags so the workflow_run-triggered CD workflows
      # can gate their deploys on what actually changed. workflow_run events carry
      # no diff base of their own, so they read the answer this push-event run
      # already computed against github.event.before..after.
      - name: Record changed areas
        run: |
          printf '%s' '${{ steps.filter.outputs.worker }}' > worker.flag
          printf '%s' '${{ steps.filter.outputs.web }}' > web.flag

      - name: Upload changed areas
        uses: actions/upload-artifact@v7
        with:
          name: changed-areas
          path: |
            worker.flag
            web.flag

  # Lint + typecheck the whole workspace once (cheap, recursive).
  lint:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup pnpm
        if: needs.prepare.outputs.manager == 'pnpm'
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ needs.prepare.outputs.node_version }}
          cache: ${{ needs.prepare.outputs.manager }}

      - name: Install dependencies
        env:
          CI: true
        run: ${{ needs.prepare.outputs.manager }} ${{ needs.prepare.outputs.command }}

      - name: Run Lint
        run: ${{ needs.prepare.outputs.runner }} run lint

      - name: Run Typecheck
        run: ${{ needs.prepare.outputs.runner }} run typecheck

  # Shared packages: one job per package, each uploads its own Codecov flag.
  packages:
    needs: [prepare, lint]
    if: needs.prepare.outputs.has_packages == 'true'
    runs-on: ubuntu-latest
    environment: CI
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.changed_packages) }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup pnpm
        if: needs.prepare.outputs.manager == 'pnpm'
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ needs.prepare.outputs.node_version }}
          cache: ${{ needs.prepare.outputs.manager }}

      - name: Install dependencies
        env:
          CI: true
        run: ${{ needs.prepare.outputs.manager }} ${{ needs.prepare.outputs.command }}

      - name: Run Tests with Coverage
        run: ${{ needs.prepare.outputs.runner }} --filter ${{ matrix.filter }} test:coverage

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./packages/${{ matrix.dir }}/coverage/lcov.info
          slug: soroush-tech/soroush.tech
          flags: ${{ matrix.flag }}
          name: ${{ matrix.dir }}

  # Cloudflare Worker API.
  worker:
    needs: [prepare, lint]
    if: needs.prepare.outputs.worker == 'true'
    runs-on: ubuntu-latest
    environment: CI
    timeout-minutes: 15
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup pnpm
        if: needs.prepare.outputs.manager == 'pnpm'
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ needs.prepare.outputs.node_version }}
          cache: ${{ needs.prepare.outputs.manager }}

      - name: Install dependencies
        env:
          CI: true
        run: ${{ needs.prepare.outputs.manager }} ${{ needs.prepare.outputs.command }}

      - name: Run Tests with Coverage
        run: ${{ needs.prepare.outputs.runner }} --filter @soroush/api test:coverage

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./workers/api/coverage/lcov.info
          slug: soroush-tech/soroush.tech
          flags: api
          name: api

  # Web app: full multi-OS suite with unit / browser / storybook / e2e coverage tiers.
  web:
    needs: [prepare, lint]
    if: needs.prepare.outputs.web == 'true'
    runs-on: ${{ matrix.os }}
    environment: CI
    timeout-minutes: 30

    # Pin the browser download location so one cache path/key works on every OS
    # (the default location differs per platform: ~/.cache, ~/Library/Caches, AppData).
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/ms-playwright

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macOS-latest]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        if: needs.prepare.outputs.manager == 'pnpm'
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ needs.prepare.outputs.node_version }}
          cache: ${{ needs.prepare.outputs.manager }}

      - name: Restore cache - Playwright binaries
        uses: actions/cache/restore@v5
        id: playwright-cache
        with:
          path: ${{ github.workspace }}/ms-playwright
          key: ${{ runner.os }}-playwright-${{ needs.prepare.outputs.playwright_version }}

      - name: Install dependencies
        env:
          CI: true
        run: ${{ needs.prepare.outputs.manager }} ${{ needs.prepare.outputs.command }}

      - name: Install Playwright browsers
        run: pnpm --filter @soroush/web exec playwright install --with-deps

      - name: Save cache - Playwright binaries
        if: always() && steps.playwright-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ github.workspace }}/ms-playwright
          key: ${{ runner.os }}-playwright-${{ needs.prepare.outputs.playwright_version }}

      - name: Build project
        if: matrix.os == 'ubuntu-latest'
        run: ${{ needs.prepare.outputs.runner }} run build
        env:
          SKIP_PRERENDER: 'true'
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Run Test
        run: ${{ needs.prepare.outputs.runner }} --filter @soroush/web test

      - name: Run Unit Tests with Coverage
        if: matrix.os == 'ubuntu-latest'
        run: ${{ needs.prepare.outputs.runner }} run test:coverage:unit

      - name: Upload Unit Test Coverage
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./apps/web/coverage/lcov.info
          slug: soroush-tech/soroush.tech
          flags: unit
          name: Unit

      - name: Run Browser Tests with Coverage
        if: matrix.os == 'ubuntu-latest'
        run: ${{ needs.prepare.outputs.runner }} run test:coverage:browser

      - name: Upload Browser Test Coverage
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./apps/web/coverage/lcov.info
          slug: soroush-tech/soroush.tech
          flags: browser
          name: Browser

      - name: Publish to Chromatic
        id: chromatic
        if: matrix.os == 'ubuntu-latest' && github.actor != 'renovate[bot]'
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          buildScriptName: build:storybook
          storybookBaseDir: apps/web
          exitZeroOnChanges: true
          onlyChanged: true

      - name: Run Storybook Tests with Coverage
        if: matrix.os == 'ubuntu-latest'
        run: ${{ needs.prepare.outputs.runner }} run test:coverage:storybook
        env:
          SB_URL: ${{ steps.chromatic.outputs.storybookUrl }}

      - name: Upload Coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./apps/web/coverage/lcov.info
          slug: soroush-tech/soroush.tech
          flags: storybook
          name: Storybook

      - name: Run E2E Tests with Coverage
        if: matrix.os == 'ubuntu-latest'
        run: ${{ needs.prepare.outputs.runner }} run test:coverage:e2e
        env:
          VITE_BASE_URL: ${{ vars.VITE_BASE_URL }}

      - name: Run E2E Tests (Firefox)
        if: matrix.os == 'windows-latest'
        run: ${{ needs.prepare.outputs.runner }} run test:e2e:firefox
        env:
          VITE_BASE_URL: ${{ vars.VITE_BASE_URL }}

      - name: Run E2E Tests (WebKit)
        if: matrix.os == 'macOS-latest'
        run: ${{ needs.prepare.outputs.runner }} run test:e2e:webkit
        env:
          VITE_BASE_URL: ${{ vars.VITE_BASE_URL }}

      - name: Upload E2E Coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./apps/web/coverage/e2e/lcov.info
          slug: soroush-tech/soroush.tech
          flags: e2e
          name: E2E

  # Single stable status check for branch protection: tolerates change-gated jobs
  # being skipped, fails only if a required job actually failed or was cancelled.
  ci-ok:
    name: ci-ok
    if: always()
    needs: [prepare, lint, packages, worker, web]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require all jobs to pass
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "A required job failed or was cancelled."
          exit 1

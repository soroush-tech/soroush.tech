comment:
  layout: 'header, diff, flags, files,  components'
  behavior: default # Add a comment on every PR with updated coverage
  require_changes: false # Always show comment, even if no coverage change

# Change-gated CI jobs don't upload every flag on every commit. Carry the last
# known report forward so skipped flags keep their coverage instead of dropping
# to "No report uploaded". paths map each flag to the files it covers.
flag_management:
  default_rules:
    carryforward: true
  individual_flags:
    # gen:codecov-flags start — regenerated by `pnpm gen:publish-options`; do not edit by hand
    - name: eslint-config
      paths:
        - packages/eslint-config/
    - name: playwright-coverage
      paths:
        - packages/playwright-coverage/
    - name: schema
      paths:
        - packages/schema/
    - name: styled-system
      paths:
        - packages/styled-system/
    - name: vite-plugin-msw-server
      paths:
        - packages/vite-plugin-msw-server/
    - name: vite-plugin-sitemap
      paths:
        - packages/vite-plugin-sitemap/
    - name: vite-plugin-watch
      paths:
        - packages/vite-plugin-watch/
    # gen:codecov-flags end
    - name: api
      paths:
        - workers/api/

component_management:
  default_rules:
    statuses:
      - type: project
        target: auto
        branches:
          - '!main'
  individual_components:
    - component_id: theme
      name: Theme
      paths:
        - apps/web/src/theme/**
    # gen:codecov-components start — regenerated by `pnpm gen:publish-options`; do not edit by hand
    - component_id: eslint-config
      name: eslint-config
      paths:
        - packages/eslint-config/**
    - component_id: playwright-coverage
      name: playwright-coverage
      paths:
        - packages/playwright-coverage/**
    - component_id: schema
      name: schema
      paths:
        - packages/schema/**
    - component_id: styled-system
      name: styled-system
      paths:
        - packages/styled-system/**
    - component_id: vite-plugin-msw-server
      name: vite-plugin-msw-server
      paths:
        - packages/vite-plugin-msw-server/**
    - component_id: vite-plugin-sitemap
      name: vite-plugin-sitemap
      paths:
        - packages/vite-plugin-sitemap/**
    - component_id: vite-plugin-watch
      name: vite-plugin-watch
      paths:
        - packages/vite-plugin-watch/**
    # gen:codecov-components end
    - component_id: api
      name: api
      paths:
        - workers/api/**
